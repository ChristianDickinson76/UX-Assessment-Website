<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accessibility Settings | Booking site</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container nav">
        <a class="brand" href="index.html">Book It</a>
        <div class="nav-actions d-flex align-items-center">
          <span id="authStatus" class="help"></span>
          <a class="btn btn-secondary" href="index.html">Concerts</a>
          <a class="btn btn-secondary" href="tickets.html">My tickets</a>
          <a id="navSignIn" class="btn btn-secondary" href="signin.html">Sign in</a>
          <a id="navSignUp" class="btn btn-primary" href="signup.html">Create account</a>
          <a id="navProfile" class="btn btn-primary hidden" href="profile.html">Profile</a>
        </div>
      </div>
    </header>

    <main class="layout-auth">
      <section class="panel shadow-sm">
        <h1>Accessibility Settings</h1>
        <p class="help">Choose display options that make the website easier to read.</p>
        <form id="accessibilityForm">
          <div class="settings-list">
            <div class="settings-option">
              <label for="prefDarkMode">
                <input id="prefDarkMode" class="settings-switch-input" type="checkbox" />
                <span>
                  Enable dark mode
                  <span class="settings-description">Switch to a dark background with lighter text.</span>
                </span>
              </label>
            </div>
            <div class="settings-option">
              <label for="prefHighContrast">
                <input id="prefHighContrast" class="settings-switch-input" type="checkbox" />
                <span>
                  Black and white colour palette
                  <span class="settings-description">Use a monochrome theme to support colour-vision differences.</span>
                </span>
              </label>
            </div>
            <div class="settings-option">
              <label for="prefLargeText">
                <input id="prefLargeText" class="settings-switch-input" type="checkbox" />
                <span>
                  Bigger text
                  <span class="settings-description">Increase font size across the website.</span>
                </span>
              </label>
            </div>
          </div>

        </form>
      </section>
    </main>
  </body>
</html>
