<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking site | Concert Booking</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container nav">
        <a class="brand" href="index.html">Booking site</a>
        <div class="nav-actions d-flex align-items-center">
          <span id="authStatus" class="help"></span>
          <a id="navSignIn" class="btn btn-secondary" href="signin.html">Sign in</a>
          <a id="navSignUp" class="btn btn-primary" href="signup.html">Create account</a>
          <button id="navSignOut" class="btn btn-ghost hidden" type="button">Sign out</button>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="hero">
        <h1>Book the Loudest Nights in Leeds</h1>
        <p class="lead">
          Discover upcoming concerts and live shows across Leeds venues, from intimate acoustic sessions to massive city-centre events.
          Pick your night, hit Book now, and lock your tickets in seconds.
        </p>
        <div class="hero-actions">
          <a class="btn btn-concerts" href="#concertsSection">View concerts</a>
        </div>
      </section>

      <section id="concertsSection" aria-label="Concerts in Leeds">
        <div id="showsGrid" class="grid"></div>
      </section>
    </main>
  </body>
</html>
