<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book It | Concert Booking</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container nav">
        <a class="brand" href="index.html">Book It</a>
        <div class="nav-actions d-flex align-items-center">
          <span id="authStatus" class="help"></span>
          <a class="btn btn-secondary" href="accessibility.html">Accessibility</a>
          <a class="btn btn-secondary" href="tickets.html">My tickets</a>
          <a id="navSignIn" class="btn btn-secondary" href="signin.html">Sign in</a>
          <a id="navSignUp" class="btn btn-primary" href="signup.html">Create account</a>
          <a id="navProfile" class="btn btn-primary hidden" href="profile.html">Profile</a>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="hero">
        <h1>Book the grooviest night in leeds</h1>
        <img src="Concert.jpeg" alt="Main Page Image: A Concert in Leeds" class="img-fluid">
        <div class="hero-actions">
        </div>
      </section>

      <section class="toolbar" aria-label="Concert filters">
        <form id="filterForm" class="filter-bar">
          <div class="form-group compact">
            <label for="categoryFilter">Category</label>
            <select id="categoryFilter" name="category">
              <option value="all">All genres</option>
              <option value="Indie Pop">Indie Pop</option>
              <option value="Theatre">Theatre</option>
              <option value="Opera">Opera</option>
              <option value="Ballet">Ballet</option>
              <option value="Concerts">Concerts</option>
              <option value="Musicals">Musicals</option>
            </select>
          </div>
          <div class="form-group compact">
            <label for="dateFilter">Date</label>
            <input id="dateFilter" name="date" type="date" />
          </div>
          <div class="filter-actions">
            <button class="btn btn-primary" type="submit">Apply filters</button>
            <button id="clearFilters" class="btn btn-secondary" type="button">Clear</button>
          </div>
        </form>
        <p id="filterSummary" class="help"></p>
      </section>

      <section id="concertsSection" aria-label="Concerts in Leeds">
        <div id="showsGrid" class="grid"></div>
      </section>
    </main>
  </body>
</html>
