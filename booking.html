<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking | Booking site</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container nav">
        <a class="brand" href="index.html">Booking site</a>
        <div class="nav-actions">
          <a class="btn btn-secondary" href="accessibility.html">Accessibility</a>
          <a class="btn btn-secondary" href="tickets.html">My tickets</a>
          <a class="btn btn-secondary" href="index.html">Back to concerts</a>
        </div>
      </div>
    </header>

    <main class="layout-auth">
      <section class="panel shadow-sm">
        <h1>Review Your Order</h1>
        <div id="bookingDetails"></div>
        <form id="bookingForm" class="needs-validation">
          <div class="form-group">
            <label for="ticketCount">Number of tickets</label>
            <select id="ticketCount" class="form-select" name="ticketCount">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
            </select>
          </div>
          <p id="bookingTotal" class="fw-bold"></p>
            <button class="btn btn-primary w-100" type="submit">Continue to payment</button>
          <div id="bookingSummary"></div>
        </form>
      </section>
    </main>
  </body>
</html>
