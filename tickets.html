<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Tickets | Booking site</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDp5NlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9gkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container nav">
        <a class="brand" href="index.html">Booking site</a>
        <div class="nav-actions d-flex align-items-center">
          <span id="authStatus" class="help"></span>
          <a class="btn btn-secondary" href="index.html">Concerts</a>
          <a class="btn btn-secondary" href="index.html#concertsSection">Book tickets</a>
          <a id="navSignIn" class="btn btn-secondary" href="signin.html">Sign in</a>
          <a id="navSignUp" class="btn btn-primary" href="signup.html">Create account</a>
          <button id="navSignOut" class="btn btn-ghost hidden" type="button">Sign out</button>
        </div>
      </div>
    </header>

    <main class="container tickets-page">
      <section class="page-intro">
        <h1>My tickets</h1>
        <p class="lead">
          Review your booked events, see your ticket count, and keep track of what you have already locked in.
        </p>
      </section>

      <section class="panel panel-wide shadow-sm">
        <div id="ticketsList" class="ticket-list"></div>
      </section>
    </main>
  </body>
</html>
