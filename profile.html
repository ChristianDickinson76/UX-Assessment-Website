<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile | Book It</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container nav">
        <a class="brand" href="index.html">Book It</a>
        <div class="nav-actions d-flex align-items-center">
          <span id="authStatus" class="help"></span>
          <a class="btn btn-secondary" href="accessibility.html">Accessibility</a>
          <a class="btn btn-secondary" href="tickets.html">Tickets</a>
          <a class="btn btn-secondary" href="index.html">Concerts</a>
          <a id="navSignIn" class="btn btn-secondary" href="signin.html">Sign in</a>
          <a id="navSignUp" class="btn btn-primary" href="signup.html">Create account</a>
          <button id="navSignOut" class="btn btn-ghost hidden" type="button">Sign out</button>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="form-section">
        <h1>My Profile</h1>

        <!-- VIEW MODE -->
        <div id="profileView" class="profile-view">
          <img id="profileViewImg" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Ccircle cx='100' cy='100' r='100' fill='%23ddd'/%3E%3C/svg%3E" alt="Profile Picture" class="profile-preview">
          <p id="profileViewBio" class="profile-bio">No bio yet.</p>
          <div class="form-actions">
            <button id="editProfileBtn" class="btn btn-primary" type="button">Edit profile</button>
          </div>
        </div>

        <!-- edit mode -->
        <form id="profileForm" class="profile-form hidden" enctype="multipart/form-data" novalidate>
          <div class="form-group">
            <label for="profilePicture">Profile Picture</label>
            <div class="profile-picture-container">
              <img id="profilePreview" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Ccircle cx='100' cy='100' r='100' fill='%23ddd'/%3E%3C/svg%3E" alt="Profile Picture" class="profile-preview">
              <input id="profilePicture" type="file" accept="image/*" />
            </div>
          </div>

          <div class="form-group">
            <label for="bioInput">Bio</label>
            <textarea id="bioInput" name="bio" placeholder="Tell us about yourself..." rows="5"></textarea>
          </div>

          <div class="form-actions">
            <button id="saveProfileBtn" class="btn btn-primary" type="submit">Save</button>
            <button id="cancelEditBtn" class="btn btn-secondary" type="button">Cancel</button>
          </div>
        </form>

        <hr class="my-5" />

        <div class="signup-section">
        </div>
      </section>
    </main>
  </body>
</html>
